<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법인 ETF 100세 시뮬레이터 | 유앤김 자산관리</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#001F5B">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
</head>
<body>

<!-- ── 헤더 -->
<header class="app-header">
  <div class="header-inner">
    <div class="header-logo">
      <span class="logo-mark">U&K</span>
      <div>
        <div class="logo-title">유앤김 자산관리</div>
        <div class="logo-sub">법인 ETF 100세 시뮬레이터</div>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon" id="saveBtn" title="이 기기에 저장" onclick="saveToLocal()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button class="btn-icon" id="exportBtn" title="백업 파일 내보내기 (다른 기기로 이전)" onclick="exportDataToFile()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="btn-icon" id="importBtn" title="백업 파일 가져오기" onclick="document.getElementById('importFileInput').click()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
      <input type="file" id="importFileInput" accept=".json" style="display:none" onchange="importDataFromFile(this)">
    </div>
  </div>
  <div class="sync-status" id="syncStatus">이 기기 저장: 없음 (자동 클라우드 동기화 아님)</div>
</header>

<!-- ── 탭 네비게이션 -->
<nav class="tab-nav">
  <button class="tab-btn active" data-tab="dashboard" onclick="switchTab('dashboard',this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    요약
  </button>
  <button class="tab-btn" data-tab="assumptions" onclick="switchTab('assumptions',this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    가정
  </button>
  <button class="tab-btn" data-tab="simulation" onclick="switchTab('simulation',this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    40년
  </button>
  <button class="tab-btn" data-tab="cashflow" onclick="switchTab('cashflow',this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    현금흐름
  </button>
  <button class="tab-btn" data-tab="children" onclick="switchTab('children',this)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    자녀지분
  </button>
</nav>

<!-- ── 메인 콘텐츠 -->
<main class="main-content">

  <!-- ① 요약 대시보드 -->
  <section id="tab-dashboard" class="tab-pane active">
    <div class="section-header">
      <h2>핵심 요약 대시보드</h2>
      <span class="tag tag-navy">1966년생 만60세→100세</span>
    </div>

    <!-- 세무 반영 범위 고지 -->
    <div id="taxDisclosure"></div>

    <!-- KPI 카드 그리드 -->
    <div class="kpi-grid" id="kpiGrid"></div>

    <!-- 차트 영역 -->
    <div class="chart-section">
      <div class="chart-header">
        <h3>자산 성장 & 배당 추이</h3>
        <div class="chart-toggles">
          <button class="ctog active" onclick="toggleChart('asset',this)">자산성장 (누적막대)</button>
          <button class="ctog" onclick="toggleChart('dividend',this)">배당추이 (혼합)</button>
          <button class="ctog" onclick="toggleChart('loan',this)">가수금 (수평)</button>
        </div>
      </div>
      <div id="chartLegend" style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px;min-height:18px"></div>
      <div style="position:relative;width:100%;height:260px">
        <canvas id="mainChart"></canvas>
      </div>
    </div>

    <!-- 핵심 이정표 -->
    <div class="milestone-section">
      <h3>핵심 이정표</h3>
      <div class="milestone-list" id="milestoneList"></div>
    </div>
  </section>

  <!-- ② 가정 입력 -->
  <section id="tab-assumptions" class="tab-pane">
    <div class="section-header">
      <h2>투자 가정 설정</h2>
      <button class="btn-recalc" onclick="recalcAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        재계산
      </button>
    </div>

    <div class="input-groups" id="inputGroups"></div>
  </section>

  <!-- ③ 40년 시뮬레이션 -->
  <section id="tab-simulation" class="tab-pane">
    <div class="section-header">
      <h2>40년 시뮬레이션</h2>
      <div class="filter-row">
        <label>표시 구간</label>
        <select id="simFilter" onchange="renderSimTableFiltered()">
          <option value="all">전체 (60~100세)</option>
          <option value="60">60대</option>
          <option value="70">70대</option>
          <option value="80">80대</option>
          <option value="90">90대 이상</option>
        </select>
      </div>
    </div>
    <div class="table-scroll">
      <table class="sim-table" id="simTable"></table>
    </div>
  </section>

  <!-- ④ 월현금흐름 -->
  <section id="tab-cashflow" class="tab-pane">
    <div class="section-header">
      <h2>월 현금흐름</h2>
      <span class="tag tag-green">세후 배당 → 가수금 우선 충당</span>
    </div>
    <div class="cf-summary" id="cfSummary"></div>
    <div class="table-scroll">
      <table class="cf-table" id="cfTable"></table>
    </div>
  </section>

  <!-- ⑤ 자녀지분가치 -->
  <section id="tab-children" class="tab-pane">
    <div class="section-header">
      <h2>자녀 지분가치</h2>
      <span class="tag tag-purple">80·85·90·95·100세 기준</span>
    </div>
    <div class="children-grid" id="childrenGrid"></div>
    <div class="share-chart-wrap">
      <h3>나이별 자녀 지분가치 성장</h3>
      <canvas id="shareChart" height="220"></canvas>
    </div>
    <div class="transfer-memo">
      <h3>자본 이전 구조</h3>
      <div class="memo-list" id="memoList"></div>
    </div>
  </section>

</main>

<!-- ── 수동입력 플로팅 버튼 -->
<button class="fab" onclick="openManualInput()" title="수동 입력">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ── 수동 입력 모달 (동적 렌더링) -->
<div id="manualModal" onclick="closeManualModal(event)">
  <div class="manual-box">
    <div class="manual-drag"></div>
    <div class="manual-header">
      <h3>수동 데이터 입력</h3>
      <button class="manual-close" onclick="closeManualModal()">✕</button>
    </div>
    <div id="manualModalBody"></div>
  </div>
</div>

<!-- ── 토스트 알림 -->
<div class="toast" id="toast"></div>

<script src="js/calc.js"></script>
<script src="js/manual-input.js"></script>
<script src="js/render.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
